name: PR Triage

on:
    pull_request_target:
        types:
            - opened
            - edited
            - reopened
            - synchronize

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: pr-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    label:
        name: Label PR
        if: github.event.action != 'edited'
        runs-on: ubuntu-latest
        steps:
            - name: Label pull request
              uses: actions/labeler@v5
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  configuration-path: .github/pr-labeler.yml
                  dot: true
                  sync-labels: true

    validate-title:
        name: Validate title
        runs-on: ubuntu-latest
        steps:
            - name: Validate pull request title
              env:
                  TITLE: ${{ github.event.pull_request.title }}
              run: |
                  REGEX="^(revert: )?(feat|fix|docs|style|refactor|perf|test|build|ci|chore|types|infra)(\\(.+\\))?!?: .{1,72}$"

                  echo "Title: \"$TITLE\""

                  shopt -s nocasematch
                  if [[ ! "$TITLE" =~ $REGEX ]]; then
                    echo "❌ PR title does not match the required format!"
                    exit 1
                  fi

    validate-body:
        name: Validate body
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/github-script@v7
              with:
                  script: |
                      const tmpl = require('fs').readFileSync('.github/pull_request_template.md', 'utf8');
                      const body = context.payload.pull_request.body || '';
                      const clean = s => s.replace(/<!--[\s\S]*?-->/g, '');
                      const [ct, cb] = [clean(tmpl), clean(body)];
                      const err = [];

                      for (const [, h] of ct.matchAll(/^(#{2,3} .+)$/gm))
                        if (!body.includes(h)) err.push(`Missing: ${h}`);
                      for (const [, h, c] of cb.matchAll(/^(### .+)\n([\s\S]*?)(?=\n##|$(?![\s\S]))/gm))
                        if (!c.trim()) err.push(`Empty: ${h}`);
                      for (const [, f] of ct.matchAll(/^- (.+):\s*$/gm)) {
                        const line = cb.split('\n').find(l => l.startsWith(`- ${f}:`));
                        if (!line || !line.slice(f.length + 3).trim()) err.push(`Unfilled: - ${f}`);
                      }
                      for (const [, h, c] of body.matchAll(/^(## .+)\n([\s\S]*?)(?=\n## |$(?![\s\S]))/gm))
                        if (/\[ \]/.test(c) && !/\[x\]/i.test(c)) err.push(`Unchecked: ${h}`);

                      if (err.length) core.setFailed(err.join('\n'));
