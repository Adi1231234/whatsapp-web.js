name: PR Triage

on:
    pull_request_target:
        types:
            - opened
            - edited
            - reopened
            - synchronize

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: pr-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    label:
        name: Label PR
        if: github.event.action != 'edited'
        runs-on: ubuntu-latest
        steps:
            - name: Label pull request
              uses: actions/labeler@v5
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  configuration-path: .github/pr-labeler.yml
                  dot: true
                  sync-labels: true

    validate-title:
        name: Validate title
        runs-on: ubuntu-latest
        steps:
            - name: Validate pull request title
              env:
                  TITLE: ${{ github.event.pull_request.title }}
              run: |
                  REGEX="^(revert: )?(feat|fix|docs|style|refactor|perf|test|build|ci|chore|types|infra)(\\(.+\\))?!?: .{1,72}$"

                  echo "Title: \"$TITLE\""

                  shopt -s nocasematch
                  if [[ ! "$TITLE" =~ $REGEX ]]; then
                    echo "❌ PR title does not match the required format!"
                    exit 1
                  fi

    validate-body:
        name: Validate body
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Validate pull request body
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const templatePath = '.github/pull_request_template.md';
                      if (!fs.existsSync(templatePath)) return;

                      const body = context.payload.pull_request.body || '';
                      const template = fs.readFileSync(templatePath, 'utf8');
                      const stripComments = s => s.replace(/<!--[\s\S]*?-->/g, '');
                      const cleanBody = stripComments(body);
                      const cleanTmpl = stripComments(template);
                      const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                      const errors = [];

                      for (const heading of cleanTmpl.match(/^## .+$/gm) || [])
                        if (!body.includes(heading)) errors.push(`Missing section: ${heading}`);

                      for (const sub of cleanTmpl.match(/^### .+$/gm) || []) {
                        const match = cleanBody.match(new RegExp(esc(sub) + '\\n([\\s\\S]*?)(?=\\n##|$)'));
                        if (!match || !match[1].trim()) errors.push(`${sub} is empty`);
                      }

                      for (const [, field] of cleanTmpl.matchAll(/^- (.+):$/gm)) {
                        const match = cleanBody.match(new RegExp(`(?:^|\\n)- ${esc(field)}:[ \\t]*(.*)`));
                        if (!match || !match[1].trim()) errors.push(`Field not filled: ${field}`);
                      }

                      let cur = '';
                      const cbSections = new Set();
                      for (const line of cleanTmpl.split('\n')) {
                        if (line.startsWith('## ')) cur = line;
                        if (line.startsWith('- [ ]')) cbSections.add(cur);
                      }
                      for (const section of cbSections) {
                        const match = body.match(new RegExp(esc(section) + '\\n([\\s\\S]*?)(?=\\n## |$)'));
                        if (!match || !match[1].includes('[x]')) errors.push(`No checkbox checked in: ${section}`);
                      }

                      if (errors.length)
                        core.setFailed('PR body does not match the required template:\n' + errors.map(e => `  - ${e}`).join('\n') + `\n\nPlease follow: ${templatePath}`);
